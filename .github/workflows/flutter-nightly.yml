name: Flutter Nightly Build

on:
  # ITStore: removed the nightly cron schedule — we only build on demand for releases,
  # and the auto-run's non-essential job failures emailed on every run. Manual
  # workflow_dispatch is kept so `gh workflow run "Flutter Nightly Build"` still works.
  workflow_dispatch:

jobs:
  run-flutter-nightly-build:
    uses: ./.github/workflows/flutter-build.yml
    secrets: inherit
    with:
      upload-artifact: true
      upload-tag: "nightly"
